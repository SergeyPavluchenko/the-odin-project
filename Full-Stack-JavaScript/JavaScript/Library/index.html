<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./style.css" />
    <title>Library</title>
  </head>
  <body>
    <!-- header -->

    <main class="library">
      <header class="header">
        <h2 class="header__title">My Library</h2>
        <input
          type="text"
          class="header__search"
          placeholder="search book..."
        />
        <button class="header__clearBtn" type="button">Clear</button>
        <button id="addBookBtn" class="header__modalBtn" type="button">
          Add book
        </button>
      </header>

      <!-- modal -->

      <dialog class="modal" id="modalAddBook">
        <button class="modal-close" id="modalClose">&times;</button>
        <form class="form__book" method="dialog">
          <label class="form__label" for="title"
            >Title
            <input
              required
              class="form__input"
              id="title"
              type="text"
              name="title"
            />
          </label>

          <label class="form__label" for="author"
            >Author
            <input
              class="form__input"
              required
              id="author"
              type="text"
              name="author"
            />
          </label>

          <label class="form__label" for="pages"
            >Pages
            <input
              class="form__input"
              required
              id="pages"
              type="number"
              name="pages"
            />
          </label>

          <label class="label__read" for="read">
            Read?
            <input type="checkbox" id="read" name="read" />
          </label>

          <button class="addBtn" type="submit">Add book</button>
        </form>
      </dialog>

      <!-- books card -->

      <div class="library__block">
        <h3 class="empty__message"></h3>
        <ul class="library__list"></ul>
      </div>
    </main>
    <script src="./script.js"></script>
  </body>
</html>
