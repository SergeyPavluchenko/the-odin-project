<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./index.css" />
    <title>Document</title>
  </head>
  <body>
    <div class="container">
      <div class="box">
        <div class="picture">
          <div class="picture_logo">
            <img class="picture_ing" src="./img/odin-lined.png" alt="odin" />
            <p class="picture_odin_p">ODIN</p>
          </div>
          <p class="picture_p">
            Photo by <span>Halie West</span> on <span>Unsplash</span>
          </p>
        </div>

                      <!-- FORM -->


        <div class="form-side">

            <div class="form-side-header">
                <h2>
                This is not a real online servise! You know you need something
                like this in your life to help you realize your deepest dreams.
                Sing up
                <em>now</em> to get started.
                </h2>
                <br />
                <h2>You <em>know</em> you want to</h2>
            </div>

            <form class="form-side-body">
                <h2>Let's do this</h2>
                <br>

                <div class="form-group">
                    <label for="firstName">FIRST NAME</label>
                    <input id="firstName" type="firstName" />
                </div>

                <div class="form-group">
                    <label for="lastName">LAST NAME</label>
                    <input id="lastName" type="lastName" />
                </div>

                <div class="form-group">
                    <label for="email">EMAIL</label>
                    <input id="email" type="email" />
                </div>

                <div class="form-group">
                    <label for="phone">PHONE NUMBER</label>
                    <input id="phone" type="phone" />
                </div>

                <div class="form-group">
                    <label for="password">PASSWORD</label>
                    <input id="password" type="password" />
                </div>

                <div class="form-group">
                    <label for="confirmPassword">CONFIRM PASSWORD</label>
                    <input id="confirmPassword" type="confirmPassword" />
                </div>

            </form>

            <div class="form-side-footer">
                <button>Create Account</button>
                <p>Already have an account?<a href="#">Log in</a></p>
            </div>

        </div>

        </div>
      </div>
    </div>
  </body>
  <script src="./form.js"></script>
</html>
